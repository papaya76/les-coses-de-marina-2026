<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        .leaflet-div-icon {
            background: transparent;
            border: none;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/Parkings_1.js"></script>
        <script src="data/Ubicacidelatenda_2.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: 'rgba(255, 255, 0, 1.00)',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: 'rgba(255, 255, 0, 1.00)',
                fillOpacity: 1
              });
            }
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[41.28426024058135,1.246057519118273],[41.28925665014321,1.2570073375303426]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_CartoVoyagerLabels_0');
        map.getPane('pane_CartoVoyagerLabels_0').style.zIndex = 400;
        var layer_CartoVoyagerLabels_0 = L.tileLayer('https://cartodb-basemaps-a.global.ssl.fastly.net/rastertiles/voyager/{z}/{x}/{y}.png', {
            pane: 'pane_CartoVoyagerLabels_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_CartoVoyagerLabels_0;
        map.addLayer(layer_CartoVoyagerLabels_0);
        
        function pop_Parkings_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['id'] !== null ? autolinker.link(String(feature.properties['id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Parkings</th>\
                        <td class="visible-with-data" id="Nom">' + (feature.properties['Nom'] !== null ? autolinker.link(String(feature.properties['Nom']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        map.createPane('pane_Parkings_1');
        map.getPane('pane_Parkings_1').style.zIndex = 401;
        map.getPane('pane_Parkings_1').style['mix-blend-mode'] = 'normal';
        var layer_Parkings_1 = new L.geoJson(json_Parkings_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Parkings_1',
            layerName: 'layer_Parkings_1',
            pane: 'pane_Parkings_1',
            onEachFeature: pop_Parkings_1,
            pointToLayer: function (feature, latlng) {
                var parkingIcon = L.divIcon({
                    className: 'custom-parking-icon',
                    html: '<div style="background-color: #007bff; color: white; width: 26px; height: 26px; border-radius: 4px; border: 2px solid white; font-weight: bold; font-family: sans-serif; display: flex; align-items: center; justify-content: center; box-shadow: 0px 2px 4px rgba(0,0,0,0.4);">P</div>',
                    iconSize: [26, 26],
                    iconAnchor: [13, 13],
                    popupAnchor: [0, -13]
                });
                return L.marker(latlng, {icon: parkingIcon});
            },
        });
        bounds_group.addLayer(layer_Parkings_1);
        map.addLayer(layer_Parkings_1);
        
        function pop_Ubicacidelatenda_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['id'] !== null ? autolinker.link(String(feature.properties['id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">nombre</th>\
                        <td class="visible-with-data" id="nombre">' + (feature.properties['nombre'] !== null ? autolinker.link(String(feature.properties['nombre']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        map.createPane('pane_Ubicacidelatenda_2');
        map.getPane('pane_Ubicacidelatenda_2').style.zIndex = 402;
        map.getPane('pane_Ubicacidelatenda_2').style['mix-blend-mode'] = 'normal';
        var layer_Ubicacidelatenda_2 = new L.geoJson(json_Ubicacidelatenda_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Ubicacidelatenda_2',
            layerName: 'layer_Ubicacidelatenda_2',
            pane: 'pane_Ubicacidelatenda_2',
            onEachFeature: pop_Ubicacidelatenda_2,
            pointToLayer: function (feature, latlng) {
                // ICONA CSS DE LA BOTIGA (Ajustada a 45x45 i amb overflow: hidden per contenir la imatge)
                var logoIcon = L.divIcon({
                    className: 'custom-tienda-icon',
                    html: '<div style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-radius: 50%; border: 2px solid #8b0000; box-shadow: 0px 3px 6px rgba(0,0,0,0.3); overflow: hidden; box-sizing: border-box; padding: 2px;"><img src="../../../images/logo.png" style="width: 100%; height: 100%; object-fit: contain;"></div>',
                    iconSize: [45, 45],
                    iconAnchor: [22, 22],
                    popupAnchor: [0, -22]
                });
                return L.marker(latlng, {icon: logoIcon});
            },
        });
        bounds_group.addLayer(layer_Ubicacidelatenda_2);
        map.addLayer(layer_Ubicacidelatenda_2);
        
        var overlaysTree = [
            {label: '<img src="legend/Ubicacidelatenda_2.png" /> Ubicació de la tenda', layer: layer_Ubicacidelatenda_2},
            {label: '<img src="legend/Parkings_1.png" /> Parkings', layer: layer_Parkings_1},
        {label: '<b>Mapas de fondo</b>',  selectAllCheckbox: true, children: [
            {label: "Carto Voyager Labels", layer: layer_CartoVoyagerLabels_0, radioGroup: 'bm' },]},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        </script>        
    </body>
</html>
